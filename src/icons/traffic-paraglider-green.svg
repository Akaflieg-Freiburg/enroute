<?xml version="1.0" encoding="UTF-8" standalone="no"?>

<svg
   width="50mm"
   height="50mm"
   viewBox="0 0 50 50">

  <!-- Top-down paraglider: wide elliptical ram-air canopy + lines + pilot -->
  <!-- Canopy: wide curved wing shape seen from above -->
  <path d="M3 14 C3 8 15 4 25 4 C35 4 47 8 47 14 C47 20 35 22 25 22 C15 22 3 20 3 14 Z"
	style="fill:none;stroke:#000000;stroke-width:4"/>
  <path d="M3 14 C3 8 15 4 25 4 C35 4 47 8 47 14 C47 20 35 22 25 22 C15 22 3 20 3 14 Z"
	style="fill:none;stroke:#ffffff;stroke-width:2"/>
  <path d="M3 14 C3 8 15 4 25 4 C35 4 47 8 47 14 C47 20 35 22 25 22 C15 22 3 20 3 14 Z"
	style="fill:#00a000;stroke:none"/>
  <!-- Cell ribs on canopy -->
  <path d="M13 6.5 L13 21 M19 5.2 L19 22 M25 4.5 L25 22 M31 5.2 L31 22 M37 6.5 L37 21"
	style="fill:none;stroke:#000000;stroke-width:1.2;stroke-opacity:0.5"/>
  <!-- Suspension lines -->
  <path d="M10 18 L23 38 M25 22 L25 38 M40 18 L27 38"
	style="fill:none;stroke:#000000;stroke-width:2;stroke-linecap:round"/>
  <path d="M10 18 L23 38 M25 22 L25 38 M40 18 L27 38"
	style="fill:none;stroke:#ffffff;stroke-width:1;stroke-linecap:round"/>
  <!-- Pilot -->
  <circle cx="25" cy="40" r="5"
	style="fill:none;stroke:#000000;stroke-width:4"/>
  <circle cx="25" cy="40" r="5"
	style="fill:none;stroke:#ffffff;stroke-width:2"/>
  <circle cx="25" cy="40" r="5"
	style="fill:#00a000;stroke:none"/>
</svg>
