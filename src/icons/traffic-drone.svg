<?xml version="1.0" encoding="UTF-8" standalone="no"?>

<svg
   width="50mm"
   height="50mm"
   viewBox="0 0 50 50">

  <!-- Quadcopter: X-frame with 4 rotor circles at the ends -->
  <!-- X frame arms -->
  <path d="M10 10 L40 40 M40 10 L10 40"
	style="fill:none;stroke:#000000;stroke-width:5;stroke-linecap:round"/>
  <path d="M10 10 L40 40 M40 10 L10 40"
	style="fill:none;stroke:#ffffff;stroke-width:3;stroke-linecap:round"/>
  <path d="M10 10 L40 40 M40 10 L10 40"
	style="fill:none;stroke:pink;stroke-width:1.5;stroke-linecap:round"/>

  <!-- 4 rotor discs -->
  <circle cx="10" cy="10" r="8" style="fill:none;stroke:#000000;stroke-width:4"/>
  <circle cx="40" cy="10" r="8" style="fill:none;stroke:#000000;stroke-width:4"/>
  <circle cx="10" cy="40" r="8" style="fill:none;stroke:#000000;stroke-width:4"/>
  <circle cx="40" cy="40" r="8" style="fill:none;stroke:#000000;stroke-width:4"/>
  <circle cx="10" cy="10" r="8" style="fill:none;stroke:#ffffff;stroke-width:2"/>
  <circle cx="40" cy="10" r="8" style="fill:none;stroke:#ffffff;stroke-width:2"/>
  <circle cx="10" cy="40" r="8" style="fill:none;stroke:#ffffff;stroke-width:2"/>
  <circle cx="40" cy="40" r="8" style="fill:none;stroke:#ffffff;stroke-width:2"/>
  <circle cx="10" cy="10" r="6" style="fill:pink;fill-opacity:0.5;stroke:none"/>
  <circle cx="40" cy="10" r="6" style="fill:pink;fill-opacity:0.5;stroke:none"/>
  <circle cx="10" cy="40" r="6" style="fill:pink;fill-opacity:0.5;stroke:none"/>
  <circle cx="40" cy="40" r="6" style="fill:pink;fill-opacity:0.5;stroke:none"/>

  <!-- Central body -->
  <rect x="20" y="20" width="10" height="10" rx="2"
	style="fill:none;stroke:#000000;stroke-width:4"/>
  <rect x="20" y="20" width="10" height="10" rx="2"
	style="fill:none;stroke:#ffffff;stroke-width:2"/>
  <rect x="20" y="20" width="10" height="10" rx="2"
	style="fill:pink;stroke:none"/>
</svg>
