<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="18"
   height="18"
   viewBox="0 0 18 18"
   version="1.1"
   id="svg1">
  <defs id="defs1" />
  <path
     d="M0 0h18v18H0z"
     fill="none"
     id="path1" />
  <!-- white outline for all parts -->
  <g style="stroke:#ffffff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none">
    <!-- diagonal arms -->
    <line x1="3" y1="3" x2="15" y2="15" />
    <line x1="15" y1="3" x2="3" y2="15" />
    <!-- center body -->
    <rect x="7" y="7" width="4" height="4" rx="1" style="fill:#ffffff" />
    <!-- motor circles -->
    <circle cx="3" cy="3" r="2.5" style="fill:#ffffff" />
    <circle cx="15" cy="3" r="2.5" style="fill:#ffffff" />
    <circle cx="3" cy="15" r="2.5" style="fill:#ffffff" />
    <circle cx="15" cy="15" r="2.5" style="fill:#ffffff" />
  </g>
  <!-- red fill layer -->
  <g style="stroke:none;fill:#ff0000">
    <!-- diagonal arms -->
    <line x1="3" y1="3" x2="15" y2="15" style="stroke:#ff0000;stroke-width:1.5" />
    <line x1="15" y1="3" x2="3" y2="15" style="stroke:#ff0000;stroke-width:1.5" />
    <!-- center body -->
    <rect x="7" y="7" width="4" height="4" rx="1" />
    <!-- motor circles (rotors) -->
    <circle cx="3" cy="3" r="2.5" />
    <circle cx="15" cy="3" r="2.5" />
    <circle cx="3" cy="15" r="2.5" />
    <circle cx="15" cy="15" r="2.5" />
  </g>
</svg>
